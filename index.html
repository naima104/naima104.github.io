<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>./index</title>
    <style>
        :root {
            --primary: #3498db;
            --text: #ffffff;
            --dim: #666666;
            --black: #000000;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--black);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 85%;
            max-width: 400px;
            text-align: center;
        }

        h3 {
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .age-display {
            font-family: monospace;
            font-size: 12px;
            color: var(--dim);
            margin-bottom: 30px;
        }

        .age-display span { color: var(--text); }

        ul {
            list-style: none;
            padding: 0;
            margin: 40px 0;
        }

        li { margin: 20px 0; }

        a {
            color: var(--text);
            text-decoration: none;
            font-size: 16px;
            transition: opacity 0.2s;
        }

        a:active { opacity: 0.5; }

        .contact {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #222;
        }

        .contact-link {
            font-size: 13px;
            color: var(--dim);
            margin: 0 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>./index</h3>
        <div class="age-display">
            AGE: <span id="yearsAlive">0.000000000000</span>
        </div>

        <ul>
            <li><a href="公告.html">公告</a></li>
            <li><a href="https://m.bilibili.com/space/3546610954931052">B站主页</a></li>
            <li><a href="压力确认页.html">起飞神器</a></li>
            <li><a href="114.html">篮球练习</a></li>
            <li><a href="项目.html">测试项目</a></li>
        </ul>

        <div class="contact">
            <a class="contact-link" href="mqqwpa://im/chat?chat_type=wpa&uin=3698088118&version=1&src_type=web">QQ</a>
            <a class="contact-link" href="mailto:3698088118@qq.com">EMAIL</a>
        </div>
    </div>

<script>
    const birthDate = new Date(2010, 11, 8);
    const MS_PER_YEAR = 31556952000;

    function updateAge() {
        const now = new Date();
        const diff = now - birthDate;
        document.getElementById('yearsAlive').textContent = (diff / MS_PER_YEAR).toFixed(12);
        requestAnimationFrame(updateAge);
    }
    updateAge();
</script>
</body>
</html>
